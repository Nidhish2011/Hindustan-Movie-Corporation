<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Room | Hindustani Productions</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        #login-section { max-width: 400px; width: 100%; text-align: center; }
        .admin-box { background: var(--panel-bg); padding: 3rem; border-radius: 16px; border: 1px solid var(--primary-green); box-shadow: 0 0 30px rgba(173, 255, 47, 0.1); backdrop-filter: blur(10px); }
        .admin-box input { background: rgba(0,0,0,0.5); border-color: #445037; }
        
        #dashboard-section { display: none; width: 100%; max-width: 800px; padding: 2rem; text-align: center; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid rgba(173, 255, 47, 0.3); padding-bottom: 1rem; }
        
        /* Asset Selection Grid */
        .asset-selection { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .asset-btn { background: var(--panel-bg); border: 1px solid #445037; color: var(--text-main); padding: 3rem 1rem; border-radius: 12px; font-family: var(--fun-font); font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .asset-btn:hover { border-color: var(--primary-green); box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 15px var(--accent-glow); transform: translateY(-5px); color: var(--primary-green); }

        /* Form Container */
        .upload-form-container { background: var(--panel-bg); padding: 3rem; border-radius: 16px; border: 1px solid rgba(173, 255, 47, 0.2); text-align: left; display: none; margin-top: 2rem; }
        .upload-form-container input, .upload-form-container textarea { width: 100%; padding: 1.2rem; background: rgba(0, 0, 0, 0.5); border: 1px solid #445037; border-radius: 10px; color: var(--text-main); font-family: var(--body-font); font-size: 1rem; margin-bottom: 1.5rem; }
        .upload-form-container input:focus, .upload-form-container textarea:focus { border-color: var(--primary-green); outline: none; }
        input[type="file"] { padding: 1rem; background: transparent; border: 1px dashed var(--primary-green); }
        
        #status-message { margin-top: 1.5rem; color: var(--primary-green); font-weight: bold; font-family: var(--fun-font); display: none; text-align: center; font-size: 1.2rem; }
        .back-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-family: var(--body-font); font-size: 0.9rem; margin-bottom: 1.5rem; transition: 0.3s; }
        .back-btn:hover { color: var(--primary-green); }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-blur"></div>

    <div id="login-section">
        <h2 style="font-size: 2rem; margin-bottom: 2rem;">DIRECTOR ACCESS</h2>
        <div class="admin-box">
            <form id="login-form">
                <input type="text" id="admin-user" placeholder="Admin ID" required>
                <input type="password" id="admin-pass" placeholder="Passcode" required>
                <button type="submit" class="submit-btn">Authorize</button>
            </form>
            <p id="login-error" style="color: red; margin-top: 1rem; display: none;">Access Denied.</p>
        </div>
        <a href="index.html" style="color: var(--text-dim); display: inline-block; margin-top: 2rem; text-decoration: none;">&larr; Return to Main Site</a>
    </div>

    <div id="dashboard-section">
        <div class="dashboard-header">
            <div class="logo">HINDUSTANI<span> CONTROL</span></div>
            <button id="logout-btn" class="listen-btn" style="width: auto; padding: 5px 20px;">LOGOUT</button>
        </div>

        <div id="step-1-selection">
            <h3 style="font-family: var(--fun-font); color: var(--text-main); font-size: 1.5rem;">Select Transmission Type</h3>
            <div class="asset-selection">
                <button class="asset-btn" data-type="Video">Video</button>
                <button class="asset-btn" data-type="Music Recording">Music Recording</button>
                <button class="asset-btn" data-type="Entire Movie">Entire Movie</button>
            </div>
        </div>
        
        <div id="step-2-form" class="upload-form-container">
            <button class="back-btn" id="back-to-selection">&larr; Change Transmission Type</button>
            
            <h3 id="form-header" style="margin-bottom: 1.5rem; font-family: var(--fun-font); color: var(--primary-green);">Upload Asset</h3>
            
            <form id="upload-form">
                <input type="hidden" id="asset-type-hidden">
                
                <label style="color: var(--text-dim); font-size: 0.9rem;">Asset Name</label>
                <input type="text" id="asset-name" placeholder="Enter title..." required>

                <label style="color: var(--text-dim); font-size: 0.9rem;">Description</label>
                <textarea id="asset-desc" rows="3" placeholder="Enter transmission details..." required></textarea>

                <div id="movie-extras" style="display: none;">
                    <label style="color: var(--text-dim); font-size: 0.9rem;">Director Name</label>
                    <input type="text" id="movie-director" placeholder="Directed by...">
                </div>

                <label style="color: var(--text-dim); font-size: 0.9rem;">Select File</label>
                <input type="file" id="asset-file" required>

                <button type="submit" class="submit-btn" style="margin-top: 1rem;">Commence Upload</button>
            </form>
            <div id="status-message">TRANSMISSION SECURED (Simulated)</div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="admin.js"></script>
</body>
</html>
